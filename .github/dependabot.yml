version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      timezone: Asia/Tokyo
    allow:
      - dependency-type: all
    rebase-strategy: auto
    assignees:
      - poad
    groups:
      actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directories:
      - '/cdk/'
      - '/cdk/kvs/'
      - '/cdk/cloudfront/'
      - '/app/'
    schedule:
      interval: daily
      timezone: Asia/Tokyo
    allow:
      - dependency-type: all
    cooldown:
      default-days: 7
    rebase-strategy: auto
    assignees:
      - poad
    groups:
      root:
        patterns:
          - '*'
